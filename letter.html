<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마음을 전해요 — 라디오 사연 편지</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500&family=DM+Mono&display=swap" rel="stylesheet">
<style>
:root{--bg:#faf8f4;--paper:#fffef9;--ink:#2c2418;--ink-light:#6b5f4e;--ink-faint:#b8aa96;
  --accent:#c8622a;--accent-pale:#f9ede4;--gold:#c8962a;--border:#e8e0d0;--border2:#d4c8b4;
  --purple:#7c5cbf;--red:#e05050;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:"Noto Sans KR",sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;
  background-image:radial-gradient(circle at 20% 80%,rgba(200,98,42,.04) 0%,transparent 50%),
                   radial-gradient(circle at 80% 20%,rgba(200,150,42,.04) 0%,transparent 50%);}
.header{text-align:center;padding:3rem 1rem 2rem;border-bottom:1px solid var(--border);}
.header-icon{font-size:2rem;margin-bottom:.6rem;}
.header h1{font-family:"Noto Serif KR",serif;font-size:1.6rem;font-weight:600;color:var(--ink);letter-spacing:-.02em;margin-bottom:.4rem;}
.header p{font-size:.88rem;color:var(--ink-light);line-height:1.7;}
.letter-wrap{max-width:640px;margin:2.5rem auto;padding:0 1rem 3rem;}
.letter-paper{background:var(--paper);border:1px solid var(--border);border-radius:4px;
  padding:2.5rem;box-shadow:0 2px 20px rgba(44,36,24,.06);position:relative;}
.letter-paper::before{content:"";position:absolute;top:0;left:3.5rem;right:0;bottom:0;
  background:repeating-linear-gradient(transparent,transparent 31px,rgba(200,150,42,.08) 31px,rgba(200,150,42,.08) 32px);
  pointer-events:none;}
.section-label{font-size:.72rem;font-weight:700;color:var(--accent);letter-spacing:.12em;
  text-transform:uppercase;margin-bottom:.6rem;display:flex;align-items:center;gap:.4rem;}
.relation-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.5rem;margin-bottom:1.8rem;}
.rel-btn{padding:.65rem .8rem;border:1px solid var(--border2);border-radius:6px;background:var(--bg);
  font-family:"Noto Sans KR",sans-serif;font-size:.82rem;color:var(--ink-light);cursor:pointer;
  text-align:center;transition:all .18s;}
.rel-btn:hover{border-color:var(--accent);color:var(--accent);}
.rel-btn.on{border-color:var(--accent);background:var(--accent-pale);color:var(--accent);font-weight:600;}
.field-group{margin-bottom:1.4rem;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;}
.field-label{font-size:.78rem;color:var(--ink-light);margin-bottom:.35rem;display:block;}
.field-input{width:100%;background:transparent;border:none;border-bottom:1px solid var(--border2);
  padding:.5rem 0;color:var(--ink);font-family:"Noto Sans KR",sans-serif;font-size:.9rem;outline:none;transition:border-color .2s;}
.field-input:focus{border-bottom-color:var(--accent);}
.field-input::placeholder{color:var(--ink-faint);}
.input-tabs{display:flex;gap:.4rem;margin-bottom:.8rem;}
.inp-tab{padding:.4rem .8rem;border:1px solid var(--border2);border-radius:6px;background:var(--bg);
  font-family:"Noto Sans KR",sans-serif;font-size:.75rem;color:var(--ink-light);cursor:pointer;transition:all .15s;}
.inp-tab:hover{border-color:var(--accent);color:var(--accent);}
.inp-tab.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;}
.letter-textarea{width:100%;min-height:220px;background:transparent;border:none;padding:0;
  color:var(--ink);font-family:"Noto Serif KR",serif;font-size:.95rem;line-height:2;
  outline:none;resize:none;position:relative;z-index:1;}
.letter-textarea::placeholder{color:var(--ink-faint);font-style:italic;}
.char-count{text-align:right;font-size:.72rem;color:var(--ink-faint);margin-top:.4rem;}
.voice-box{background:var(--bg);border:1.5px dashed var(--border2);border-radius:10px;padding:1.5rem;text-align:center;}
.voice-hint{font-size:.82rem;color:var(--ink-light);margin-bottom:1rem;line-height:1.6;}
.voice-row{display:flex;align-items:center;justify-content:center;gap:.8rem;flex-wrap:wrap;}
.rec-btn{padding:.7rem 1.6rem;border:none;border-radius:8px;background:var(--accent);color:#fff;
  font-family:"Noto Sans KR",sans-serif;font-size:.88rem;font-weight:600;cursor:pointer;transition:all .2s;}
.rec-btn.purple{background:var(--purple);}
.rec-btn.recording{animation:recPulse 1s infinite;}
@keyframes recPulse{0%,100%{box-shadow:0 0 0 0 rgba(200,98,42,.5)}50%{box-shadow:0 0 0 10px rgba(200,98,42,0)}}
.rec-timer{font-size:.9rem;font-weight:700;color:var(--accent);min-width:48px;font-family:"DM Mono",monospace;}
.stt-timer{font-size:.9rem;font-weight:700;color:var(--purple);min-width:48px;font-family:"DM Mono",monospace;}
audio{width:100%;border-radius:8px;margin-top:.8rem;}
.upload-zone{margin-top:.8rem;border:1px dashed var(--border2);border-radius:8px;padding:.8rem;cursor:pointer;transition:all .2s;}
.upload-zone:hover{border-color:var(--accent);}
.upload-zone p{font-size:.8rem;color:var(--ink-faint);}
.fname{color:var(--accent);margin-top:.3rem;font-size:.8rem;}
.stt-status{font-size:.78rem;color:var(--ink-faint);margin-top:.6rem;min-height:1.4em;}
.tag-grid{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.5rem;}
.tag-chip{padding:.3rem .7rem;border:1px solid var(--border2);border-radius:20px;
  font-size:.75rem;color:var(--ink-light);cursor:pointer;transition:all .15s;background:var(--bg);}
.tag-chip:hover{border-color:var(--accent);color:var(--accent);}
.tag-chip.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:500;}
.divider{border:none;border-top:1px solid var(--border);margin:1.5rem 0;}
.send-btn{width:100%;padding:1rem;background:var(--accent);color:#fff;border:none;border-radius:6px;
  font-family:"Noto Serif KR",serif;font-size:1rem;font-weight:600;cursor:pointer;
  transition:all .2s;letter-spacing:.02em;margin-top:1.5rem;}
.send-btn:hover{background:#b5551f;transform:translateY(-1px);box-shadow:0 4px 16px rgba(200,98,42,.3);}
.send-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none;}
.error-msg{color:var(--red);font-size:.8rem;margin-top:.8rem;display:none;text-align:center;}
.success-screen{display:none;text-align:center;padding:2rem 0;}
.success-icon{font-size:3rem;margin-bottom:1rem;}
.success-title{font-family:"Noto Serif KR",serif;font-size:1.3rem;font-weight:600;color:var(--ink);margin-bottom:.6rem;}
.success-desc{font-size:.88rem;color:var(--ink-light);line-height:1.8;margin-bottom:1.5rem;}
.link-box{background:var(--accent-pale);border:1px solid rgba(200,98,42,.2);border-radius:8px;padding:1rem 1.2rem;margin-bottom:1rem;text-align:left;}
.link-label{font-size:.7rem;color:var(--accent);font-weight:700;letter-spacing:.1em;margin-bottom:.4rem;}
.link-url{font-family:"DM Mono",monospace;font-size:.8rem;color:var(--ink);word-break:break-all;line-height:1.5;}
.action-btn{width:100%;padding:.75rem;border:none;border-radius:6px;
  font-family:"Noto Sans KR",sans-serif;font-size:.88rem;cursor:pointer;transition:all .2s;margin-bottom:.5rem;}
.copy-btn{background:var(--ink);color:#fff;}
.copy-btn:hover{background:#4a3c2a;}
.kakao-btn{background:#FEE500;color:#000;font-weight:700;}
.kakao-btn:hover{background:#e6cf00;}
.new-btn{background:transparent;color:var(--accent);border:1px solid var(--accent);margin-top:.3rem;}
.new-btn:hover{background:var(--accent-pale);}
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">&#128140;</div>
  <h1>마음을 전해요</h1>
  <p>소중한 사람에게 사연을 보내세요<br>DJ가 라디오 방송으로 특별하게 전달해 드립니다</p>
</div>

<div class="letter-wrap">
  <div class="letter-paper" id="write-form">

    <div class="field-group">
      <div class="section-label">&#128155; 누구에게 보내나요?</div>
      <div class="relation-grid">
        <button class="rel-btn" data-val="family" onclick="selectRelation(this)">&#128106; 가족</button>
        <button class="rel-btn" data-val="friend" onclick="selectRelation(this)">&#129309; 친구/지인</button>
        <button class="rel-btn" data-val="lover"  onclick="selectRelation(this)">&#10084;&#65039; 연인/배우자</button>
        <button class="rel-btn" data-val="anyone" onclick="selectRelation(this)">&#127800; 누구에게나</button>
      </div>
    </div>

    <hr class="divider">

    <div class="field-group">
      <div class="field-row">
        <div>
          <label class="field-label">보내는 사람 이름</label>
          <input class="field-input" id="from-name" placeholder="이름 또는 별명" maxlength="20">
        </div>
        <div>
          <label class="field-label">받는 사람 이름</label>
          <input class="field-input" id="to-name" placeholder="이름 또는 별명" maxlength="20">
        </div>
      </div>
      <div class="field-row" style="margin-top:.9rem;">
        <div>
          <label class="field-label">보내는 사람 전화번호</label>
          <input class="field-input" id="from-phone" type="tel" placeholder="010-0000-0000" maxlength="13" oninput="formatPhone(this)">
        </div>
        <div>
          <label class="field-label">받는 사람 전화번호</label>
          <input class="field-input" id="to-phone" type="tel" placeholder="010-0000-0000" maxlength="13" oninput="formatPhone(this)">
        </div>
      </div>
    </div>

    <div class="field-group">
      <label class="field-label">제목 (선택)</label>
      <input class="field-input" id="letter-title" placeholder="예: 엄마, 항상 감사해요" maxlength="50">
    </div>

    <hr class="divider">

    <div class="field-group">
      <div class="section-label">전하고 싶은 말</div>
      <div class="input-tabs">
        <button class="inp-tab on" id="tab-text" onclick="switchTab('text')">&#9999;&#65039; 텍스트</button>
        <button class="inp-tab"   id="tab-rec"  onclick="switchTab('rec')">&#127897;&#65039; 음성 녹음</button>
        <button class="inp-tab"   id="tab-stt"  onclick="switchTab('stt')">&#128221; 받아쓰기</button>
      </div>

      <div id="panel-text">
        <textarea class="letter-textarea" id="letter-text"
          placeholder="하고 싶은 말을 자유롭게 적어주세요&#10;마음 속에 담아둔 이야기, 고마움, 미안함, 사랑하는 마음&#10;DJ가 이 사연을 읽고 특별한 라디오 방송을 만들어 드립니다."
          oninput="document.getElementById('char-count').textContent=this.value.length"
          maxlength="2000"></textarea>
        <div class="char-count"><span id="char-count">0</span> / 2000</div>
      </div>

      <div id="panel-rec" style="display:none;">
        <div class="voice-box">
          <p class="voice-hint">버튼을 눌러 음성으로 편지를 녹음하세요</p>
          <div class="voice-row">
            <button class="rec-btn" id="rec-btn" onclick="toggleRec()">&#128308; 녹음 시작</button>
            <span class="rec-timer" id="rec-timer" style="display:none;">00:00</span>
          </div>
          <div id="audio-preview"></div>
          <div class="upload-zone" onclick="document.getElementById('file-input').click()">
            <input type="file" id="file-input" accept="audio/*" onchange="handleFile(this)" style="display:none;">
            <p>또는 음성 파일 업로드 (클릭)</p>
            <p class="fname" id="fname"></p>
          </div>
        </div>
      </div>

      <div id="panel-stt" style="display:none;">
        <div class="voice-box">
          <p class="voice-hint">버튼을 누르고 말하면 텍스트로 변환됩니다</p>
          <div class="voice-row">
            <button class="rec-btn purple" id="stt-btn" onclick="toggleSTT()">&#127908; 받아쓰기 시작</button>
            <span class="stt-timer" id="stt-timer" style="display:none;">00:00</span>
          </div>
          <p class="stt-status" id="stt-status"></p>
          <textarea class="letter-textarea" id="stt-text"
            placeholder="받아쓴 내용이 여기에 표시됩니다…"
            style="margin-top:.8rem;min-height:160px;"
            oninput="document.getElementById('stt-char-count').textContent=this.value.length"
            maxlength="2000"></textarea>
          <div class="char-count"><span id="stt-char-count">0</span> / 2000</div>
        </div>
      </div>
    </div>

    <hr class="divider">

    <div class="field-group">
      <div class="section-label">담긴 감정</div>
      <div class="tag-grid">
        <span class="tag-chip" onclick="this.classList.toggle('on')">감사</span>
        <span class="tag-chip" onclick="this.classList.toggle('on')">사랑</span>
        <span class="tag-chip" onclick="this.classList.toggle('on')">미안함</span>
        <span class="tag-chip" onclick="this.classList.toggle('on')">그리움</span>
        <span class="tag-chip" onclick="this.classList.toggle('on')">응원</span>
        <span class="tag-chip" onclick="this.classList.toggle('on')">자랑스러움</span>
        <span class="tag-chip" onclick="this.classList.toggle('on')">위로</span>
        <span class="tag-chip" onclick="this.classList.toggle('on')">기쁨</span>
        <span class="tag-chip" onclick="this.classList.toggle('on')">설렘</span>
        <span class="tag-chip" onclick="this.classList.toggle('on')">걱정</span>
      </div>
    </div>

    <p class="error-msg" id="error-msg"></p>
    <button class="send-btn" id="send-btn" onclick="submitLetter()">&#128140; 편지 보내기</button>
  </div>

  <div class="letter-paper success-screen" id="success-screen">
    <div class="success-icon">&#127881;</div>
    <div class="success-title">편지가 만들어졌어요!</div>
    <div class="success-desc">
      아래 링크를 <strong id="to-name-display"></strong>에게 공유하세요.<br>
      링크를 열면 DJ가 만든 특별한 라디오 방송을 함께 볼 수 있어요.
    </div>
    <div class="link-box">
      <div class="link-label">공유 링크</div>
      <div class="link-url" id="share-url"></div>
    </div>
    <button class="action-btn copy-btn" onclick="copyLink()">링크 복사</button>
    <button class="action-btn kakao-btn" onclick="shareKakao()">카카오톡으로 공유</button>
    <button class="action-btn new-btn" onclick="resetForm()">+ 새 편지 쓰기</button>
  </div>
</div>

<script>
var selectedRelation = '';
var recBlob = null, uploadedFile = null;
var recorder = null, recChunks = [], recActive = false;
var recTimerInt = null, recSecs = 0;
var recognition = null, recognizing = false;
var sttTimerInt = null, sttSecs = 0;
var currentTab = 'text';

function selectRelation(el) {
  document.querySelectorAll('.rel-btn').forEach(function(b){ b.classList.remove('on'); });
  el.classList.add('on');
  selectedRelation = el.dataset.val;
}

function formatPhone(el) {
  var v = el.value.replace(/[^0-9]/g, '');
  if(v.length <= 3) el.value = v;
  else if(v.length <= 7) el.value = v.slice(0,3) + '-' + v.slice(3);
  else el.value = v.slice(0,3) + '-' + v.slice(3,7) + '-' + v.slice(7,11);
}

function switchTab(tab) {
  if(recognizing) stopSTT();
  if(recActive) stopRec();
  currentTab = tab;
  ['text','rec','stt'].forEach(function(t) {
    document.getElementById('panel-' + t).style.display = (t === tab) ? 'block' : 'none';
    document.getElementById('tab-' + t).classList.toggle('on', t === tab);
  });
}

function toggleRec() {
  if(!recActive) { startRec(); } else { stopRec(); }
}

function startRec() {
  navigator.mediaDevices.getUserMedia({audio: true}).then(function(stream) {
    recChunks = [];
    recorder = new MediaRecorder(stream);
    recorder.ondataavailable = function(e) { if(e.data.size > 0) recChunks.push(e.data); };
    recorder.onstop = function() {
      recBlob = new Blob(recChunks, {type: 'audio/webm'});
      var url = URL.createObjectURL(recBlob);
      document.getElementById('audio-preview').innerHTML =
        '<audio controls style="width:100%;margin-top:.8rem;" src="' + url + '"></audio>';
      stream.getTracks().forEach(function(t){ t.stop(); });
    };
    recorder.start();
    recActive = true;
    document.getElementById('rec-btn').textContent = '중지';
    document.getElementById('rec-btn').classList.add('recording');
    recSecs = 0;
    document.getElementById('rec-timer').style.display = 'inline';
    recTimerInt = setInterval(function() {
      recSecs++;
      document.getElementById('rec-timer').textContent =
        String(Math.floor(recSecs/60)).padStart(2,'0') + ':' + String(recSecs%60).padStart(2,'0');
    }, 1000);
  }).catch(function() {
    alert('마이크 접근 권한이 필요합니다.');
  });
}

function stopRec() {
  if(recorder && recActive) { try { recorder.stop(); } catch(e) {} }
  recActive = false;
  clearInterval(recTimerInt);
  var btn = document.getElementById('rec-btn');
  if(btn) { btn.textContent = '녹음 시작'; btn.classList.remove('recording'); }
  var timer = document.getElementById('rec-timer');
  if(timer) timer.style.display = 'none';
}

function handleFile(input) {
  var f = input.files[0]; if(!f) return;
  uploadedFile = f;
  document.getElementById('fname').textContent = f.name;
}

function toggleSTT() {
  if(!recognizing) { startSTT(); } else {
    stopSTT();
    var st = document.getElementById('stt-status');
    if(st) st.textContent = '받아쓰기 완료 — 내용을 확인하고 편집하세요';
  }
}

function startSTT() {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR) {
    document.getElementById('stt-status').textContent = '이 브라우저는 받아쓰기를 지원하지 않습니다 (Chrome 권장)';
    return;
  }
  recognizing = true;
  document.getElementById('stt-btn').textContent = '중지';
  document.getElementById('stt-btn').style.opacity = '0.8';
  document.getElementById('stt-timer').style.display = 'inline';
  document.getElementById('stt-status').textContent = '듣고 있어요...';
  sttSecs = 0;
  sttTimerInt = setInterval(function() {
    sttSecs++;
    document.getElementById('stt-timer').textContent =
      String(Math.floor(sttSecs/60)).padStart(2,'0') + ':' + String(sttSecs%60).padStart(2,'0');
  }, 1000);
  runRecognition();
}

function runRecognition() {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'ko-KR';
  recognition.continuous = false;
  recognition.interimResults = true;
  var base = document.getElementById('stt-text').value;

  recognition.onresult = function(e) {
    var interim = '';
    for(var i = e.resultIndex; i < e.results.length; i++) {
      if(e.results[i].isFinal) {
        var t = e.results[i][0].transcript.trim();
        base = base ? (base + ' ' + t) : t;
      } else { interim = e.results[i][0].transcript; }
    }
    var el = document.getElementById('stt-text');
    el.value = base + (interim ? ' ' + interim : '');
    document.getElementById('stt-char-count').textContent = el.value.length;
  };

  recognition.onend = function() {
    if(!recognizing) return;
    base = document.getElementById('stt-text').value.trimEnd();
    setTimeout(function() { if(recognizing) runRecognition(); }, 150);
  };

  recognition.onerror = function(e) {
    if(e.error === 'no-speech' && recognizing) {
      setTimeout(function() { if(recognizing) runRecognition(); }, 200);
    } else if(e.error === 'not-allowed') {
      document.getElementById('stt-status').textContent = '마이크 권한이 거부됐습니다.';
      stopSTT();
    }
  };
  try { recognition.start(); } catch(e) {}
}

function stopSTT() {
  recognizing = false;
  if(recognition) { try { recognition.abort(); } catch(e) {} recognition = null; }
  clearInterval(sttTimerInt);
  var btn = document.getElementById('stt-btn');
  if(btn) { btn.textContent = '받아쓰기 시작'; btn.style.opacity = '1'; }
  var timer = document.getElementById('stt-timer');
  if(timer) timer.style.display = 'none';
}

async function submitLetter() {
  var fromName  = document.getElementById('from-name').value.trim();
  var toName    = document.getElementById('to-name').value.trim();
  var fromPhone = document.getElementById('from-phone').value.trim();
  var toPhone   = document.getElementById('to-phone').value.trim();
  var title     = document.getElementById('letter-title').value.trim();
  var emotions  = Array.from(document.querySelectorAll('.tag-chip.on')).map(function(t){ return t.textContent.trim(); });
  var errEl     = document.getElementById('error-msg');

  var text = '';
  if(currentTab === 'text') text = document.getElementById('letter-text').value.trim();
  else if(currentTab === 'stt') text = document.getElementById('stt-text').value.trim();
  else if(currentTab === 'rec' && (recBlob || uploadedFile)) text = '음성 편지입니다.';

  if(!fromName || !toName) {
    errEl.textContent = '보내는 사람과 받는 사람 이름을 입력해주세요.';
    errEl.style.display = 'block'; return;
  }
  if(!text && !recBlob && !uploadedFile) {
    errEl.textContent = '전하고 싶은 말을 입력해주세요.';
    errEl.style.display = 'block'; return;
  }
  errEl.style.display = 'none';

  var btn = document.getElementById('send-btn');
  btn.disabled = true; btn.textContent = '전송 중...';

  if(recognizing) stopSTT();

  try {
    var res;
    var vs = recBlob || uploadedFile;
    if(vs) {
      var fd = new FormData();
      fd.append('from_name', fromName); fd.append('to_name', toName);
      fd.append('from_phone', fromPhone); fd.append('to_phone', toPhone);
      fd.append('title', title || (fromName + 'i ga ' + toName + 'ege'));
      fd.append('text', text);
      fd.append('relation', selectedRelation || 'anyone');
      fd.append('emotions', JSON.stringify(emotions));
      var ext = vs instanceof File ? (vs.name.split('.').pop() || 'webm') : 'webm';
      fd.append('voice', vs, 'voice.' + ext);
      res = await fetch('/api/letters', {method:'POST', body:fd});
    } else {
      res = await fetch('/api/letters', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({from_name:fromName, to_name:toName,
          from_phone:fromPhone, to_phone:toPhone,
          title: title || (fromName + '이(가) ' + toName + '에게'),
          text:text, relation:selectedRelation||'anyone', emotions:emotions})
      });
    }
    if(!res.ok) { var et = await res.text(); throw new Error(res.status + ': ' + et); }
    var d = await res.json();
    if(!d.success) throw new Error(d.error || '전송 실패');

    var url = location.origin + '/letter/' + d.id;
    document.getElementById('share-url').textContent = url;
    document.getElementById('to-name-display').textContent = toName;
    document.getElementById('write-form').style.display = 'none';
    document.getElementById('success-screen').style.display = 'block';
    window._shareUrl = url; window._toName = toName; window._fromName = fromName;

  } catch(e) {
    console.error(e);
    errEl.textContent = '오류: ' + e.message;
    errEl.style.display = 'block';
    btn.disabled = false; btn.textContent = '편지 보내기';
  }
}

function copyLink() {
  navigator.clipboard.writeText(window._shareUrl)
    .then(function(){ alert('링크가 복사됐습니다!'); })
    .catch(function(){ prompt('링크:', window._shareUrl); });
}

function shareKakao() {
  var msg = window._fromName + '이(가) 당신에게 라디오 편지를 보냈어요\n\n' + window._shareUrl;
  if(navigator.share) { navigator.share({title:'라디오 편지', url:window._shareUrl}); }
  else { navigator.clipboard.writeText(msg).then(function(){ alert('카카오톡에 붙여넣기 하세요!\n\n' + msg); }); }
}

function resetForm() {
  document.getElementById('write-form').style.display = 'block';
  document.getElementById('success-screen').style.display = 'none';
  ['from-name','to-name','from-phone','to-phone','letter-title','letter-text','stt-text'].forEach(function(id){
    var el = document.getElementById(id); if(el) el.value = '';
  });
  document.getElementById('char-count').textContent = '0';
  document.getElementById('stt-char-count').textContent = '0';
  document.getElementById('audio-preview').innerHTML = '';
  document.getElementById('fname').textContent = '';
  document.getElementById('stt-status').textContent = '';
  document.querySelectorAll('.tag-chip.on,.rel-btn.on').forEach(function(el){ el.classList.remove('on'); });
  selectedRelation=''; recBlob=null; uploadedFile=null;
  switchTab('text');
  var btn = document.getElementById('send-btn');
  btn.disabled=false; btn.textContent='편지 보내기';
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
</body>
