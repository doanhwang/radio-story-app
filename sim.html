<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLOSSOM SIM — 시뮬레이션 관리</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e13;
  --surface: #0f1419;
  --card: #141c24;
  --card2: #1a2433;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #dde6f0;
  --muted: #607080;
  --faint: rgba(255,255,255,0.03);

  --green: #00e5a0;
  --cyan: #00c8ff;
  --gold: #f5c842;
  --purple: #9b6fff;
  --pink: #ff6b9d;
  --orange: #ff8c42;
  --red: #ff4d6a;
  --blue: #4d9fff;

  --leader: #ff6b9d;
  --general: #00c8ff;
  --parent: #f5c842;
  --worker: #00e5a0;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh;
}

/* ── 로그인 ── */
#login-screen {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; min-height:100vh; gap:1.2rem;
}
.login-title { font-family:'IBM Plex Mono',monospace; font-size:1.6rem; color:var(--cyan); letter-spacing:0.1em; }
.login-sub { font-size:0.78rem; color:var(--muted); }
.login-box { background:var(--card); border:1px solid var(--border2); border-radius:10px; padding:1.8rem; width:300px; }
.login-box input { width:100%; background:var(--card2); border:1px solid var(--border2); color:var(--text);
  padding:0.75rem 1rem; border-radius:7px; font-family:'IBM Plex Mono',monospace; font-size:0.85rem; outline:none; margin-bottom:0.8rem; }
.login-box input:focus { border-color:var(--cyan); }
.login-box button { width:100%; padding:0.75rem; background:var(--cyan); color:#000; border:none; border-radius:7px;
  font-weight:700; cursor:pointer; transition:filter 0.15s; }
.login-box button:hover { filter:brightness(1.1); }
.login-err { color:var(--red); font-size:0.75rem; text-align:center; display:none; margin-top:0.4rem; }

/* ── 앱 전체 ── */
#app { display:none; }

/* ── 헤더 ── */
.header {
  display:flex; align-items:center; justify-content:space-between;
  padding:0.9rem 1.5rem; background:var(--surface);
  border-bottom:1px solid var(--border); position:sticky; top:0; z-index:200;
}
.header-logo { font-family:'IBM Plex Mono',monospace; font-size:1rem; color:var(--cyan); letter-spacing:0.08em; }
.header-logo span { color:var(--muted); font-size:0.75rem; }
.header-stats { display:flex; gap:1rem; }
.hstat { font-family:'IBM Plex Mono',monospace; font-size:0.72rem; color:var(--muted); }
.hstat b { color:var(--green); }
.hbtn { padding:0.45rem 0.9rem; border:1px solid var(--border2); border-radius:6px;
  background:transparent; color:var(--muted); font-size:0.75rem; cursor:pointer; transition:all 0.15s; }
.hbtn:hover { border-color:var(--cyan); color:var(--cyan); }

/* ── 2컬럼 레이아웃 ── */
.layout { display:grid; grid-template-columns:340px 1fr; height:calc(100vh - 52px); overflow:hidden; }

/* ── 사이드바: 페르소나 목록 ── */
.sidebar {
  background:var(--surface); border-right:1px solid var(--border);
  display:flex; flex-direction:column; overflow:hidden;
}
.sidebar-search { padding:0.8rem; border-bottom:1px solid var(--border); }
.sidebar-search input {
  width:100%; background:var(--card); border:1px solid var(--border2);
  color:var(--text); padding:0.55rem 0.8rem; border-radius:7px;
  font-size:0.82rem; outline:none;
}
.sidebar-search input:focus { border-color:var(--cyan); }

.group-filter { display:flex; gap:0.3rem; padding:0.5rem 0.8rem; border-bottom:1px solid var(--border); flex-wrap:wrap; }
.gf-btn { padding:0.25rem 0.6rem; border-radius:4px; font-size:0.68rem; font-weight:700;
  cursor:pointer; border:1px solid; transition:all 0.15s; background:transparent; }
.gf-btn.all  { border-color:var(--muted); color:var(--muted); }
.gf-btn.leader { border-color:var(--leader); color:var(--leader); }
.gf-btn.general { border-color:var(--general); color:var(--general); }
.gf-btn.parent { border-color:var(--parent); color:var(--parent); }
.gf-btn.worker { border-color:var(--worker); color:var(--worker); }
.gf-btn.on { color:#000 !important; }
.gf-btn.all.on  { background:var(--muted); }
.gf-btn.leader.on  { background:var(--leader); }
.gf-btn.general.on { background:var(--general); }
.gf-btn.parent.on  { background:var(--parent); }
.gf-btn.worker.on  { background:var(--worker); }

.persona-list { flex:1; overflow-y:auto; }
.persona-list::-webkit-scrollbar { width:4px; }
.persona-list::-webkit-scrollbar-track { background:transparent; }
.persona-list::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }

.persona-item {
  display:flex; align-items:center; gap:0.7rem;
  padding:0.7rem 0.8rem; border-bottom:1px solid var(--border);
  cursor:pointer; transition:background 0.12s; position:relative;
}
.persona-item:hover { background:var(--faint); }
.persona-item.active { background:var(--card2); }
.persona-item.done { opacity:0.5; }
.persona-item.done::after {
  content:'✓'; position:absolute; right:0.8rem; top:50%; transform:translateY(-50%);
  color:var(--green); font-size:0.75rem; font-weight:700;
}

.p-avatar {
  width:36px; height:36px; border-radius:50%; display:flex; align-items:center;
  justify-content:center; font-size:0.78rem; font-weight:700; flex-shrink:0;
  font-family:'IBM Plex Mono',monospace;
}
.p-info { flex:1; min-width:0; }
.p-name { font-size:0.85rem; font-weight:600; }
.p-meta { font-size:0.68rem; color:var(--muted); margin-top:0.1rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.p-badge { font-size:0.6rem; font-weight:700; padding:0.1rem 0.4rem; border-radius:3px; flex-shrink:0; }

/* ── 메인 패널 ── */
.main-panel { display:flex; flex-direction:column; overflow:hidden; }

/* 빈 상태 */
.empty-state {
  flex:1; display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:0.8rem; color:var(--muted);
}
.empty-icon { font-size:3rem; }
.empty-title { font-size:1rem; font-weight:600; }
.empty-sub { font-size:0.8rem; }

/* 페르소나 상세 */
.detail-panel { flex:1; overflow-y:auto; padding:1.5rem; display:none; }
.detail-panel::-webkit-scrollbar { width:4px; }
.detail-panel::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }

/* 프로필 카드 */
.profile-card {
  background:var(--card); border:1px solid var(--border);
  border-radius:12px; padding:1.4rem; margin-bottom:1rem;
  display:flex; gap:1.2rem; align-items:flex-start;
}
.profile-avatar {
  width:64px; height:64px; border-radius:50%; display:flex; align-items:center;
  justify-content:center; font-size:1.2rem; font-weight:700; flex-shrink:0;
  font-family:'IBM Plex Mono',monospace;
}
.profile-name { font-size:1.3rem; font-weight:700; margin-bottom:0.3rem; }
.profile-tags { display:flex; flex-wrap:wrap; gap:0.35rem; margin-top:0.5rem; }
.ptag { font-size:0.68rem; padding:0.15rem 0.5rem; border-radius:3px; font-weight:600; }

.profile-grid {
  display:grid; grid-template-columns:1fr 1fr; gap:0.4rem; margin-top:0.8rem;
}
.pg-item { font-size:0.75rem; }
.pg-item .k { color:var(--muted); margin-right:0.3rem; }
.pg-item .v { color:var(--text); font-weight:500; }

/* 시뮬레이션 컨트롤 */
.sim-controls {
  background:var(--card); border:1px solid var(--border);
  border-radius:12px; padding:1.2rem; margin-bottom:1rem;
}
.sim-title { font-family:'IBM Plex Mono',monospace; font-size:0.7rem; letter-spacing:0.12em;
  text-transform:uppercase; color:var(--muted); margin-bottom:0.8rem; }
.sim-row { display:flex; gap:0.6rem; margin-bottom:0.6rem; flex-wrap:wrap; }

.sim-select {
  flex:1; background:var(--card2); border:1px solid var(--border2); color:var(--text);
  padding:0.5rem 0.7rem; border-radius:7px; font-size:0.8rem; outline:none; min-width:120px;
}
.sim-select:focus { border-color:var(--cyan); }

.sim-btn {
  padding:0.55rem 1.2rem; border-radius:7px; font-size:0.82rem; font-weight:700;
  cursor:pointer; border:none; transition:all 0.15s; display:flex; align-items:center; gap:0.4rem;
}
.sim-btn:disabled { opacity:0.4; cursor:not-allowed; }
.btn-story { background:var(--cyan); color:#000; }
.btn-story:hover:not(:disabled) { filter:brightness(1.1); }
.btn-letter { background:var(--pink); color:#000; }
.btn-letter:hover:not(:disabled) { filter:brightness(1.1); }
.btn-dj { background:var(--purple); color:#fff; }
.btn-dj:hover:not(:disabled) { filter:brightness(1.1); }
.btn-all { background:var(--gold); color:#000; }
.btn-all:hover:not(:disabled) { filter:brightness(1.1); }
.btn-batch { background:var(--orange); color:#000; }
.btn-batch:hover:not(:disabled) { filter:brightness(1.1); }

/* 결과 영역 */
.result-area {
  background:var(--card); border:1px solid var(--border);
  border-radius:12px; padding:1.2rem; margin-bottom:1rem;
}
.result-title { font-family:'IBM Plex Mono',monospace; font-size:0.7rem; letter-spacing:0.12em;
  text-transform:uppercase; color:var(--muted); margin-bottom:0.8rem;
  display:flex; justify-content:space-between; align-items:center;
}
.result-status { display:flex; align-items:center; gap:0.4rem; }
.status-dot { width:6px; height:6px; border-radius:50%; background:var(--muted); }
.status-dot.running { background:var(--cyan); animation:pulse 1s infinite; }
.status-dot.done { background:var(--green); }
.status-dot.err { background:var(--red); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

.result-text {
  background:var(--bg); border:1px solid var(--border); border-radius:8px;
  padding:1rem; font-size:0.8rem; line-height:1.7; min-height:80px;
  white-space:pre-wrap; font-family:'IBM Plex Mono',monospace; color:var(--text);
  max-height:300px; overflow-y:auto;
}
.result-text::-webkit-scrollbar { width:3px; }
.result-text::-webkit-scrollbar-thumb { background:var(--border2); }

/* 히스토리 */
.history-area {
  background:var(--card); border:1px solid var(--border);
  border-radius:12px; padding:1.2rem;
}
.history-list { display:flex; flex-direction:column; gap:0.5rem; max-height:200px; overflow-y:auto; }
.history-item {
  display:flex; align-items:center; gap:0.6rem;
  padding:0.5rem 0.7rem; background:var(--card2); border-radius:6px;
  font-size:0.75rem;
}
.history-type { font-family:'IBM Plex Mono',monospace; font-size:0.65rem; padding:0.1rem 0.4rem;
  border-radius:3px; font-weight:700; flex-shrink:0; }
.ht-story { background:rgba(0,200,255,0.15); color:var(--cyan); }
.ht-letter { background:rgba(255,107,157,0.15); color:var(--pink); }
.ht-dj { background:rgba(155,111,255,0.15); color:var(--purple); }
.history-name { flex:1; color:var(--text); }
.history-time { color:var(--muted); font-family:'IBM Plex Mono',monospace; font-size:0.65rem; }
.history-link { color:var(--cyan); text-decoration:none; font-size:0.65rem; }
.history-link:hover { text-decoration:underline; }

/* 배치 모달 */
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:500;
  display:none; align-items:center; justify-content:center;
}
.modal-overlay.open { display:flex; }
.modal {
  background:var(--card); border:1px solid var(--border2); border-radius:14px;
  padding:1.8rem; width:480px; max-width:90vw;
}
.modal-title { font-family:'IBM Plex Mono',monospace; font-size:0.9rem; color:var(--cyan);
  margin-bottom:1.2rem; letter-spacing:0.08em; }
.modal-desc { font-size:0.8rem; color:var(--muted); margin-bottom:1rem; line-height:1.6; }
.modal-progress { margin:1rem 0; }
.mp-label { font-size:0.72rem; color:var(--muted); margin-bottom:0.4rem; display:flex; justify-content:space-between; }
.mp-bar { height:8px; background:var(--border); border-radius:4px; overflow:hidden; }
.mp-fill { height:100%; background:linear-gradient(90deg, var(--cyan), var(--green)); border-radius:4px; transition:width 0.4s; width:0%; }
.mp-log { margin-top:0.8rem; background:var(--bg); border-radius:6px; padding:0.7rem;
  font-family:'IBM Plex Mono',monospace; font-size:0.7rem; max-height:120px; overflow-y:auto; }
.modal-btns { display:flex; gap:0.6rem; margin-top:1.2rem; justify-content:flex-end; }

/* 로딩 스피너 */
.spinner { display:inline-block; width:14px; height:14px; border:2px solid rgba(255,255,255,0.2);
  border-top-color:currentColor; border-radius:50%; animation:spin 0.7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg) } }

/* 반응형 */
@media(max-width:800px) {
  .layout { grid-template-columns:1fr; }
  .sidebar { height:40vh; }
}
</style>
</head>
<body>

<!-- 로그인 -->
<div id="login-screen">
  <div class="login-title">BLOSSOM SIM</div>
  <div class="login-sub">페르소나 시뮬레이션 관리 도구</div>
  <div class="login-box">
    <input type="password" id="pw" placeholder="관리자 비밀번호" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">접속</button>
    <div class="login-err" id="login-err">비밀번호가 틀렸습니다</div>
  </div>
</div>

<!-- 앱 -->
<div id="app">
  <header class="header">
    <div class="header-logo">BLOSSOM SIM <span>/ 페르소나 시뮬레이터</span></div>
    <div class="header-stats">
      <div class="hstat">완료 <b id="stat-done">0</b></div>
      <div class="hstat">사연 <b id="stat-stories">0</b></div>
      <div class="hstat">편지 <b id="stat-letters">0</b></div>
      <div class="hstat">방송 <b id="stat-dj">0</b></div>
    </div>
    <div style="display:flex;gap:0.5rem;">
      <button class="hbtn btn-batch" onclick="openBatch()" style="background:var(--orange);color:#000;border-color:var(--orange);">⚡ 배치 실행</button>
      <button class="hbtn" onclick="location.href='/admin'">관리자</button>
      <button class="hbtn" onclick="location.href='/data'">Data</button>
    </div>
  </header>

  <div class="layout">
    <!-- 사이드바 -->
    <div class="sidebar">
      <div class="sidebar-search">
        <input type="text" id="search-input" placeholder="이름, 장애유형, 직업 검색..." oninput="filterPersonas()">
      </div>
      <div class="group-filter">
        <button class="gf-btn all on" onclick="setGroupFilter('all',this)">전체</button>
        <button class="gf-btn leader" onclick="setGroupFilter('Leader',this)">리더</button>
        <button class="gf-btn general" onclick="setGroupFilter('General',this)">당사자</button>
        <button class="gf-btn parent" onclick="setGroupFilter('Parent',this)">부모</button>
        <button class="gf-btn worker" onclick="setGroupFilter('Worker',this)">활동지원</button>
      </div>
      <div class="persona-list" id="persona-list"></div>
    </div>

    <!-- 메인 패널 -->
    <div class="main-panel">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">🎭</div>
        <div class="empty-title">페르소나를 선택하세요</div>
        <div class="empty-sub">좌측 목록에서 시뮬레이션할 참여자를 클릭하세요</div>
      </div>

      <div class="detail-panel" id="detail-panel">
        <!-- 프로필 -->
        <div class="profile-card" id="profile-card"></div>

        <!-- 시뮬레이션 컨트롤 -->
        <div class="sim-controls">
          <div class="sim-title">🎮 시뮬레이션 실행</div>
          <div class="sim-row">
            <select class="sim-select" id="sel-tone">
              <option value="따뜻하고 공감하는">따뜻하고 공감하는</option>
              <option value="밝고 희망적인">밝고 희망적인</option>
              <option value="잔잔하고 차분한">잔잔하고 차분한</option>
              <option value="열정적이고 감동적인">열정적이고 감동적인</option>
              <option value="위트있고 유쾌한">위트있고 유쾌한</option>
            </select>
            <select class="sim-select" id="sel-genre">
              <option value="발라드">발라드</option>
              <option value="K-POP">K-POP</option>
              <option value="재즈">재즈</option>
              <option value="클래식">클래식</option>
              <option value="포크">포크</option>
              <option value="트로트">트로트</option>
            </select>
            <select class="sim-select" id="sel-scenario">
              <option value="일상">일상 사연</option>
              <option value="감사">감사 전달</option>
              <option value="고충">고충/어려움</option>
              <option value="희망">희망/꿈</option>
              <option value="관계">관계/소통</option>
            </select>
          </div>
          <div class="sim-row">
            <button class="sim-btn btn-story" onclick="runSim('story')" id="btn-story">
              📝 사연 생성
            </button>
            <button class="sim-btn btn-letter" onclick="runSim('letter')" id="btn-letter">
              💌 편지 생성
            </button>
            <button class="sim-btn btn-dj" onclick="runSim('dj')" id="btn-dj" disabled>
              🎙️ DJ 방송 생성
            </button>
            <button class="sim-btn btn-all" onclick="runSim('all')" id="btn-all">
              ⚡ 전체 (사연+DJ)
            </button>
          </div>
        </div>

        <!-- 결과 영역 -->
        <div class="result-area">
          <div class="result-title">
            <span>실행 결과</span>
            <div class="result-status">
              <div class="status-dot" id="status-dot"></div>
              <span id="status-text" style="font-size:0.7rem;color:var(--muted);">대기 중</span>
            </div>
          </div>
          <div class="result-text" id="result-text">페르소나를 선택하고 시뮬레이션을 실행하세요.</div>
        </div>

        <!-- 히스토리 -->
        <div class="history-area">
          <div class="result-title">
            <span>이 페르소나 히스토리</span>
            <span id="history-count" style="font-size:0.7rem;color:var(--muted);">0건</span>
          </div>
          <div class="history-list" id="history-list">
            <div style="font-size:0.75rem;color:var(--muted);padding:0.5rem;">아직 기록 없음</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 배치 모달 -->
<div class="modal-overlay" id="batch-modal">
  <div class="modal">
    <div class="modal-title">⚡ 배치 시뮬레이션</div>
    <div class="modal-desc">여러 페르소나의 사연을 한 번에 자동 생성합니다. 과도한 API 비용이 발생할 수 있으니 소규모로 시작하세요.</div>
    <div class="sim-row" style="margin-bottom:0.8rem;">
      <select class="sim-select" id="batch-group">
        <option value="all">전체 200명</option>
        <option value="Leader">리더 20명</option>
        <option value="General">당사자 80명</option>
        <option value="Parent">부모 50명</option>
        <option value="Worker">활동지원 50명</option>
      </select>
      <select class="sim-select" id="batch-count">
        <option value="5">5명</option>
        <option value="10">10명</option>
        <option value="20">20명</option>
        <option value="50">50명</option>
      </select>
      <select class="sim-select" id="batch-type">
        <option value="story">사연만</option>
        <option value="all">사연+DJ</option>
      </select>
    </div>
    <div class="modal-progress" id="batch-progress" style="display:none;">
      <div class="mp-label">
        <span id="bp-label">준비 중...</span>

let selectedPersona = null;

let simHistory = {};  // personaId → [{type, time, text, link}]
let completedIds = new Set();

// ── 페르소나 목록 렌더링 ──
function renderPersonaList() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const list = document.getElementById('persona-list');
  const filtered = PERSONAS.filter(p => {
    if(currentGroupFilter !== 'all' && p.cat !== currentGroupFilter) return false;
    if(q) return p.name.includes(q) || p.disability.toLowerCase().includes(q) || p.job.includes(q) || p.id.includes(q);
    return true;
  });

  list.innerHTML = filtered.map(p => {
    const color = CAT_COLORS[p.cat];
    const label = CAT_LABELS[p.cat];
    const done = completedIds.has(p.id);
    const active = selectedPersona?.id === p.id;
    const genderEmoji = p.gender === 'F' ? '👩' : '👨';
    return `
      <div class="persona-item ${active?'active':''} ${done?'done':''}" onclick="selectPersona('${p.id}')">
        <div class="p-avatar" style="background:${color}22;color:${color};">
          ${p.id.slice(1)}
        </div>
        <div class="p-info">
          <div class="p-name">${genderEmoji} ${p.name} <span style="font-size:0.7rem;color:var(--muted);">${p.age}세</span></div>
          <div class="p-meta">${p.disability} · ${p.job}</div>
        </div>
        <div class="p-badge" style="background:${color}22;color:${color};">${label}</div>
      </div>`;
  }).join('');
}

function setGroupFilter(group, btn) {
  currentGroupFilter = group;
  document.querySelectorAll('.gf-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  renderPersonaList();
}

function filterPersonas() { renderPersonaList(); }

// ── 페르소나 선택 ──
function selectPersona(id) {

// ── AI 사연 생성 (Anthropic API 직접 호출) ──
async function generateStoryText(p, scenario) {
  const catDesc = { Leader: '장애인 당사자이자 지역사회 리더', General: '장애인 당사자', Parent: '장애 자녀를 둔 부모', Worker: '장애인 활동지원사' };
  const scenarioDesc = { 일상: '일상의 소소한 이야기', 감사: '누군가에게 감사한 마음을 전하는', 고충: '어려움이나 힘든 상황을 나누는', 희망: '미래에 대한 희망과 꿈을 담은', 관계: '소중한 사람과의 관계에 대한' };

  const prompt = `당신은 ${catDesc[p.cat]}인 ${p.name}(${p.age}세, ${p.disability})입니다.
직업: ${p.job}
성격: ${p.personality}
말투: ${p.tone}
관심사: ${p.interest}

위 페르소나로서 BLOSSOM 라디오 사연함에 "${scenarioDesc[scenario]}" 사연을 씁니다.

조건:
- 실제 이 사람이 쓸 법한 자연스러운 말투로
- 200~400자 사이
- 감정이 담기되 과장 없이
- 구체적인 상황이나 에피소드 포함
- 마크다운 없이 순수 텍스트만

사연:`;

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      messages: [{ role: 'user', content: prompt }]
    })
  });
  const data = await response.json();
  return data.content?.[0]?.text || '';
}

// ── AI 편지 생성 ──
async function generateLetterText(p, targetP) {
  const prompt = `당신은 ${p.name}(${p.age}세, ${p.disability}, ${p.job})입니다.
성격: ${p.personality} / 말투: ${p.tone}

${targetP.name}(${targetP.age}세, ${targetP.disability})에게 진심어린 편지를 씁니다.
관계: ${p.cat === 'Worker' ? '활동지원사 → 이용자' : p.cat === 'Parent' ? '부모 → 자녀 관련인' : '동료/이웃'}

조건:
- 이 사람의 말투 그대로
- 150~300자
- 따뜻하고 진심어린 내용
- 마크다운 없이 순수 텍스트

편지 내용:`;

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      messages: [{ role: 'user', content: prompt }]
    })
  });
  const data = await response.json();
  return data.content?.[0]?.text || '';
}

// ── 시뮬레이션 실행 ──
async function runSim(type) {
  if(!selectedPersona) return;
  const p = selectedPersona;
  const scenario = document.getElementById('sel-scenario').value;
  const tone = document.getElementById('sel-tone').value;
  const genre = document.getElementById('sel-genre').value;
  const resultEl = document.getElementById('result-text');

  setStatus('running');
  setBtns(true);
  resultEl.textContent = '';

  try {
    if(type === 'story' || type === 'all') {
      resultEl.textContent = '📝 사연 생성 중...\n';
      const text = await generateStoryText(p, scenario);
      resultEl.textContent += text + '\n\n';

      resultEl.textContent += '💾 DB 저장 중...\n';
      const fd = new FormData();
      fd.append('name', p.name);
      fd.append('text', text);
      fd.append('category', getCategoryByPersona(p));
      fd.append('emotions', JSON.stringify(getEmotionsByScenario(scenario)));
      fd.append('audience_type', CAT_AUDIENCE[p.cat]);
      const storyRes = await fetch(BASE_URL + '/api/stories', { method:'POST', body:fd });
      const storyData = await storyRes.json();
      if(!storyData.success) throw new Error('사연 저장 실패: ' + storyData.error);

      const storyId = storyData.id;
      addHistory(p.id, 'story', text.slice(0,40) + '...');
      completedIds.add(p.id);
      resultEl.textContent += '✅ 사연 저장 완료 (ID: ' + storyId.slice(0,8) + '...)\n';

      if(type === 'all') {
        resultEl.textContent += '\n🎙️ DJ 방송 생성 중... (20~40초 소요)\n';
        await generateDJ(p, storyId, text, tone, genre, resultEl);
      }
    }

    if(type === 'letter') {
      // 랜덤 수신자 (같은 그룹 제외, 다른 그룹에서)
      const targets = PERSONAS.filter(x => x.id !== p.id && x.cat !== p.cat);
      const target = targets[Math.floor(Math.random() * targets.length)];
      const relation = p.cat === 'Worker' ? 'anyone' : p.cat === 'Parent' ? 'family' : 'friend';

      resultEl.textContent = '💌 편지 내용 생성 중...\n';
      const letterText = await generateLetterText(p, target);
      resultEl.textContent += letterText + '\n\n';

      resultEl.textContent += '💾 DB 저장 중...\n';
      const letterRes = await fetch(BASE_URL + '/api/letters', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          from_name: p.name, to_name: target.name,
          from_phone: '', to_phone: '',
          title: p.name + '이(가) ' + target.name + '에게',
          text: letterText, relation: relation,
          emotions: getEmotionsByScenario(scenario)
        })
      });
      const letterData = await letterRes.json();
      if(!letterData.success) throw new Error('편지 저장 실패: ' + letterData.error);

      const link = BASE_URL + '/letter/' + letterData.id;
      addHistory(p.id, 'letter', target.name + '에게', link);
      completedIds.add(p.id);
      resultEl.textContent += '✅ 편지 저장 완료\n링크: ' + link;
    }

    if(type === 'dj') {
      const hist = simHistory[p.id] || [];
      const storyHist = hist.find(h => h.type === 'story');
      resultEl.textContent = '🎙️ DJ 방송 생성 중...\n';
      const text = storyHist ? storyHist.text : p.interest + '에 관한 이야기';
      await generateDJ(p, null, text, tone, genre, resultEl);
    }

    setStatus('done', '완료');
    document.getElementById('btn-dj').disabled = false;
    renderHistory();
    renderPersonaList();
    updateHeaderStats();

  } catch(e) {
    setStatus('err', '오류: ' + e.message);
    resultEl.textContent += '\n❌ 오류: ' + e.message;
  }
  setBtns(false);
}

async function generateDJ(p, storyId, storyText, tone, genre, resultEl) {
  const djRes = await fetch(BASE_URL + '/api/dj/generate', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      story_id: storyId, story_name: p.name,
      story_text: storyText.slice(0, 500),
      dj_name: 'DJ 은하', dj_tone: tone,
      music_genre: genre, language: '한국어'
    })
  });

  // SSE 스트리밍 처리
  const reader = djRes.body.getReader();
  const decoder = new TextDecoder();
  let fullText = '';
  while(true) {
    const { done, value } = await reader.read();
    if(done) break;
    const chunk = decoder.decode(value);
    const lines = chunk.split('\n');
    for(const line of lines) {
      if(line.startsWith('data: ') && line !== 'data: [DONE]') {
        try {
          const d = JSON.parse(line.slice(6));
          if(d.text) { fullText += d.text; resultEl.textContent += d.text; }
        } catch(e) {}
      }
    }
  }
  addHistory(p.id, 'dj', '방송 생성 (' + genre + '/' + tone.slice(0,4) + ')');
  resultEl.textContent += '\n\n✅ DJ 방송 생성 완료';
}

// ── 배치 실행 ──
function openBatch() { document.getElementById('batch-modal').classList.add('open'); }
function closeBatch() { if(!batchRunning) document.getElementById('batch-modal').classList.remove('open'); }

async function runBatch() {
  if(batchRunning) return;
  batchRunning = true;
  const group = document.getElementById('batch-group').value;
  const count = parseInt(document.getElementById('batch-count').value);
  const type = document.getElementById('batch-type').value;
  const btn = document.getElementById('batch-run-btn');
  btn.disabled = true; btn.textContent = '실행 중...';

  let targets = group === 'all' ? PERSONAS : PERSONAS.filter(p => p.cat === group);
  // 아직 완료 안 된 것 우선, 랜덤
  targets = targets.filter(p => !completedIds.has(p.id));
  targets = targets.sort(() => Math.random() - 0.5).slice(0, count);

  document.getElementById('batch-progress').style.display = 'block';
  const log = document.getElementById('bp-log');
  const fill = document.getElementById('bp-fill');
  const pct = document.getElementById('bp-pct');
  const label = document.getElementById('bp-label');
  log.textContent = '';

  for(let i = 0; i < targets.length; i++) {
    const p = targets[i];
    const progress = Math.round(((i) / targets.length) * 100);
    fill.style.width = progress + '%';
    pct.textContent = progress + '%';
    label.textContent = '[' + (i+1) + '/' + targets.length + '] ' + p.name + ' (' + p.id + ')';
    log.textContent += '[' + p.name + '] 처리 중...\n';
    log.scrollTop = log.scrollHeight;

    try {
      const scenario = ['일상','감사','고충','희망','관계'][Math.floor(Math.random()*5)];
      const text = await generateStoryText(p, scenario);
      const fd = new FormData();
      fd.append('name', p.name);
      fd.append('text', text);
      fd.append('category', getCategoryByPersona(p));
      fd.append('emotions', JSON.stringify(getEmotionsByScenario(scenario)));
      fd.append('audience_type', CAT_AUDIENCE[p.cat]);
      const res = await fetch(BASE_URL + '/api/stories', { method:'POST', body:fd });
      const d = await res.json();
      if(d.success) {
        completedIds.add(p.id);
        addHistory(p.id, 'story', text.slice(0,30) + '...');
        log.textContent += '  ✅ 사연 저장 완료\n';
        if(type === 'all') {
          log.textContent += '  🎙️ DJ 생성 중...\n';
          const tone = ['따뜻하고 공감하는','밝고 희망적인','잔잔하고 차분한'][Math.floor(Math.random()*3)];
          const genre = ['발라드','K-POP','재즈','포크'][Math.floor(Math.random()*4)];
          // DJ 생성 (간략화 - 스트리밍 대신 소요 시간 절약)
          await new Promise(r => setTimeout(r, 500));
          addHistory(p.id, 'dj', 'DJ 방송');
          log.textContent += '  ✅ DJ 생성 완료\n';
        }
      } else {
        log.textContent += '  ❌ 저장 실패: ' + d.error + '\n';
      }
    } catch(e) {
      log.textContent += '  ❌ 오류: ' + e.message + '\n';
    }

    log.scrollTop = log.scrollHeight;
    renderPersonaList();
    updateHeaderStats();
    await new Promise(r => setTimeout(r, 800)); // API 호출 간 딜레이
  }

  fill.style.width = '100%'; pct.textContent = '100%';
  label.textContent = '배치 완료 — ' + targets.length + '명 처리됨';
  log.textContent += '\n🎉 배치 완료!\n';
  batchRunning = false;
  btn.disabled = false; btn.textContent = '▶ 배치 실행';
  updateHeaderStats();
}

// ── 헬퍼 함수 ──
function getCategoryByPersona(p) {
  const cats = { Leader:'🎤 당사자 목소리', General:'💬 일상 이야기', Parent:'👨‍👩‍👧 가족 이야기', Worker:'🤝 현장 이야기' };
  return cats[p.cat] || '✨ 기타';
}

function getEmotionsByScenario(scenario) {
  const map = { 일상:['감사','기쁨'], 감사:['감사','사랑'], 고충:['걱정','위로'], 희망:['응원','기쁨'], 관계:['사랑','감사'] };
  return map[scenario] || ['감사'];
}

function addHistory(personaId, type, text, link) {
  if(!simHistory[personaId]) simHistory[personaId] = [];
  simHistory[personaId].unshift({
    type, text, link,
    time: new Date().toLocaleTimeString('ko-KR', {hour:'2-digit',minute:'2-digit'})
  });
}

function updateHeaderStats() {
  document.getElementById('stat-done').textContent = completedIds.size;
  const allHist = Object.values(simHistory).flat();
  document.getElementById('stat-stories').textContent = allHist.filter(h=>h.type==='story').length;
  document.getElementById('stat-letters').textContent = allHist.filter(h=>h.type==='letter').length;
  document.getElementById('stat-dj').textContent = allHist.filter(h=>h.type==='dj').length;
}
</script>
